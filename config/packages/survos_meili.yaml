when@never:
    _anchors:
        openai_base: &openai_base
            source: 'openAi'
            apiKey: '%env(OPENAI_API_KEY)%'
        openai_large: &openai_large
            <<: *openai_base
            model: 'text-embedding-3-large'
        openai_small: &openai_small
            <<: *openai_base
            model: 'text-embedding-3-small'

survos_meili:
    host: '%env(default::MEILI_SERVER)%'
    apiKey: '%env(default::MEILI_API_KEY)%'
    searchKey: '%env(default::MEILI_SEARCH_KEY)%'
    multiLingual: false
    translationStyle: off # off, simple/key, compound (label/info)?  per-index? do we need a translation domain?

    chat:
        workspaces:
            meili_assistant:
                source: openAi
                apiKey: '%env(OPENAI_API_KEY)%'
                model: gpt-4o-mini
                label: Collection
                indexes: ['meili_product', 'meili_movie', 'meili_marvel', 'meili_car', 'meili_wine', 'meili_wcma', 'meili_jeopardy', 'meili_official', 'meili_indexinfo']
                curatorNameByIndex:
                    movie: Movie Collection Curator
                examplesByIndex:
                    movie:
                        - comedy and action movies
                        - romantic drama films
                        - animated family movies
                detailUrlPattern: null
                examples:
                    - notable items in this collection
                    - show me 5 works with short descriptions
                    - surprising or unusual pieces
                    - artworks related to a topic

            wam_assistant:
                source: openAi
                apiKey: '%env(OPENAI_API_KEY)%'
                model: gpt-4o-mini
                label: WAM Collection
                indexes: ['meili_wam']
                detailUrlPattern: null
                prompts:
                    system: |
                        You are the WAM Collection curator.
                        For healthcare/medical intent, also search related terms like nurse, hospital, clinic, doctor, medicine, ward, and patient.
                        If the first search returns no results, retry at least twice with broader or synonym-based queries before concluding none were found.
                examples:
                    - portraits of nurses
                    - items related to medicine or healthcare
                    - wartime hospital scenes
                    - photographs of medical staff

